<svg xmlns="http://www.w3.org/2000/svg" width="820" height="260" viewBox="0 0 820 260" role="img" aria-labelledby="title desc">
  <title id="title">Beta machine component footprint</title>
  <desc id="desc">Implementation summary showing 12 subcircuits, 202 recursive components, 8 registers, 2 ROMs, and 1 RAM.</desc>
  <rect width="820" height="260" fill="#f8fafc"/>
  <text x="32" y="42" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700">Component footprint</text>
  <text x="32" y="68" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="14">Full-machine Logisim statistics</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(32 100)">
      <rect width="132" height="92" rx="8" fill="#0f766e"/>
      <text x="18" y="38" fill="#ffffff" font-size="30" font-weight="700">12</text>
      <text x="18" y="66" fill="#ccfbf1" font-size="14">subcircuits</text>
    </g>
    <g transform="translate(184 100)">
      <rect width="132" height="92" rx="8" fill="#1d4ed8"/>
      <text x="18" y="38" fill="#ffffff" font-size="30" font-weight="700">202</text>
      <text x="18" y="66" fill="#dbeafe" font-size="14">components</text>
    </g>
    <g transform="translate(336 100)">
      <rect width="132" height="92" rx="8" fill="#7c3aed"/>
      <text x="18" y="38" fill="#ffffff" font-size="30" font-weight="700">8</text>
      <text x="18" y="66" fill="#ede9fe" font-size="14">registers</text>
    </g>
    <g transform="translate(488 100)">
      <rect width="132" height="92" rx="8" fill="#b45309"/>
      <text x="18" y="38" fill="#ffffff" font-size="30" font-weight="700">2</text>
      <text x="18" y="66" fill="#fef3c7" font-size="14">ROMs</text>
    </g>
    <g transform="translate(640 100)">
      <rect width="132" height="92" rx="8" fill="#be123c"/>
      <text x="18" y="38" fill="#ffffff" font-size="30" font-weight="700">1</text>
      <text x="18" y="66" fill="#ffe4e6" font-size="14">RAM</text>
    </g>
  </g>
</svg>
